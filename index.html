<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BloxWorld 3D - Sandbox Avatar</title>
  <meta name="description" content="Controla un avatar estilo Roblox en un mundo 3D interactivo con físicas, plataformas y personalización de colores en tiempo real.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Importmaps polyfill -->
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <!-- 3D Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Crosshair for Shooter -->
  <div id="crosshair"></div>
  
  <!-- Red screen flash on damage -->
  <div id="damage-overlay"></div>

  <!-- HUD & Overlays -->
  <div id="hud-container">
    <!-- Header -->
    <header class="glass-panel main-header">
      <div class="logo-area">
        <span class="icon">🕹️</span>
        <h1>BloxWorld 3D</h1>
      </div>
      <div class="hud-stats">
        <div class="stat-badge hp-badge">
          <span class="stat-icon">❤️</span>
          <div class="hp-bar-container"><div id="hp-bar-fill" style="width: 100%;"></div></div>
          <span id="hp-value">100</span>
        </div>
        <div class="stat-badge kills-badge">
          <span class="stat-icon">👾</span>
          <span id="kills-count">0</span>
        </div>
        <div class="stat-badge coin-badge">
          <span class="stat-icon">🪙</span>
          <span id="coin-count">0</span>
        </div>
      </div>
    </header>

    <!-- Sidebar / Customizer -->
    <aside id="customizer-panel" class="glass-panel collapsed">
      <button id="toggle-customizer" class="panel-trigger" aria-label="Personalizar avatar">
        <span class="trigger-icon">🎨</span>
        <span class="trigger-text">Personalizar</span>
      </button>
      
      <div class="panel-content">
        <h2>Personalización</h2>
        <p class="panel-subtitle">Elige los colores de tu avatar</p>
        
        <div class="customizer-section">
          <h3>Piel (Cabeza/Brazos)</h3>
          <div class="color-options" data-target="skin">
            <button class="color-btn active" style="background-color: #ffdbac;" data-color="#ffdbac"></button>
            <button class="color-btn" style="background-color: #f1c27d;" data-color="#f1c27d"></button>
            <button class="color-btn" style="background-color: #e0ac69;" data-color="#e0ac69"></button>
            <button class="color-btn" style="background-color: #ffd1dc;" data-color="#ffd1dc"></button>
            <button class="color-btn" style="background-color: #a0db8e;" data-color="#a0db8e"></button>
            <button class="color-btn" style="background-color: #add8e6;" data-color="#add8e6"></button>
          </div>
        </div>

        <div class="customizer-section">
          <h3>Torso (Camisa)</h3>
          <div class="color-options" data-target="torso">
            <button class="color-btn active" style="background-color: #e63946;" data-color="#e63946"></button>
            <button class="color-btn" style="background-color: #3a86c8;" data-color="#3a86c8"></button>
            <button class="color-btn" style="background-color: #2a9d8f;" data-color="#2a9d8f"></button>
            <button class="color-btn" style="background-color: #f4a261;" data-color="#f4a261"></button>
            <button class="color-btn" style="background-color: #8338ec;" data-color="#8338ec"></button>
            <button class="color-btn" style="background-color: #212529;" data-color="#212529"></button>
          </div>
        </div>

        <div class="customizer-section">
          <h3>Pantalones</h3>
          <div class="color-options" data-target="pants">
            <button class="color-btn active" style="background-color: #1d3557;" data-color="#1d3557"></button>
            <button class="color-btn" style="background-color: #457b9d;" data-color="#457b9d"></button>
            <button class="color-btn" style="background-color: #e76f51;" data-color="#e76f51"></button>
            <button class="color-btn" style="background-color: #6c757d;" data-color="#6c757d"></button>
            <button class="color-btn" style="background-color: #ffffff;" data-color="#ffffff"></button>
            <button class="color-btn" style="background-color: #ffd166;" data-color="#ffd166"></button>
          </div>
        </div>

        <div class="customizer-actions">
          <button id="reset-position-btn" class="action-btn secondary">
            <span>🔄</span> Respawn
          </button>
        </div>
      </div>
    </aside>

    <!-- Desktop Instructions -->
    <div id="instructions-panel" class="glass-panel">
      <h3>Controles</h3>
      <ul>
        <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> - Moverse</li>
        <li><kbd>Espacio</kbd> - Saltar</li>
        <li><kbd>F</kbd> - Disparar</li>
        <li><kbd>Click Izq. + Arrastrar</kbd> - Girar Cámara</li>
        <li><kbd>Rueda</kbd> - Zoom</li>
      </ul>
    </div>

    <!-- Mobile UI Controls -->
    <div id="mobile-controls">
      <div id="joystick-container">
        <div id="joystick-base">
          <div id="joystick-handle"></div>
        </div>
      </div>
      <div class="mobile-actions-wrapper">

        <button id="jump-button" class="mobile-action-btn" aria-label="Saltar">
          <span>▲</span>
        </button>
      </div>
    </div>

    <!-- Audio Control Button -->
    <button id="audio-toggle" class="glass-panel round-btn" aria-label="Mutear Sonido">
      <span id="audio-icon">🔊</span>
    </button>
  </div>

  <!-- Main Game JS -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
